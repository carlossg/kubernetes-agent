apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-4-e4b-server
  namespace: gemma-system
  labels:
    app: gemma-4-e4b-server
    model: gemma-4-e4b-it
    demo: argo-rollouts
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gemma-4-e4b-server
  template:
    metadata:
      labels:
        app: gemma-4-e4b-server
        model: gemma-4-e4b-it
        demo: argo-rollouts
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: "nvidia-l4"
      containers:
        - name: gemma
          image: us-docker.pkg.dev/vertex-ai/vertex-vision-model-garden-dockers/pytorch-vllm-serve:gemma4
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: MODEL_NAME
              value: "google/gemma-4-E4B-it"
            - name: SERVED_MODEL_NAME
              value: "gemma-4-e4b-it"
            - name: MAX_MODEL_LEN
              value: "8192"
            - name: GPU_MEMORY_UTILIZATION
              value: "0.90"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-secret
                  key: token
            - name: HF_HOME
              value: "/model-cache"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
          command:
            - vllm
            - serve
            - $(MODEL_NAME)
            - --served-model-name
            - $(SERVED_MODEL_NAME)
            - --max-model-len
            - $(MAX_MODEL_LEN)
            - --gpu-memory-utilization
            - $(GPU_MEMORY_UTILIZATION)
            - --dtype
            - bfloat16
            - --quantization
            - fp8
            - --kv-cache-dtype
            - fp8
            - --enable-chunked-prefill
            - --enable-prefix-caching
            - --max-num-seqs
            - "8"
            - --enable-auto-tool-choice
            - --tool-call-parser
            - gemma4
            - --reasoning-parser
            - gemma4
            - --trust-remote-code
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "24Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
      restartPolicy: Always
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: gemma-4-e4b-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: gemma-4-e4b-server
  namespace: gemma-system
  labels:
    app: gemma-4-e4b-server
    model: gemma-4-e4b-it
spec:
  selector:
    app: gemma-4-e4b-server
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  type: ClusterIP
